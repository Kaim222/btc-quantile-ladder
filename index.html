const SEED_PRICES = BTC_HISTORY.map(({days, price}) => {

// Fit EMA-weighted power law regression. halfLifeDays=Infinity → Kaim fixed.
function fitEMA(halfLifeDays) {
  if (!halfLifeDays || halfLifeDays >= 1e9) return { A: JV_A, B: JV_B };
  const todayDays = (Date.now() - GENESIS_MS) / 86400000;
  let sw=0, swx=0, swy=0, swxx=0, swxy=0;
  for (const {days, price} of BTC_HISTORY) {
    const age = todayDays - days;
    const w = Math.exp(-Math.LN2 * age / halfLifeDays);
    const x = Math.log10(days);
    const y = Math.log10(price);
    sw   += w;
    swx  += w * x;
    swy  += w * y;
    swxx += w * x * x;
    swxy += w * x * y;
  }
  const denom = sw * swxx - swx * swx;
  if (Math.abs(denom) < 1e-12) return { A: JV_A, B: JV_B };
  const A = (sw * swxy - swx * swy) / denom;
  const B = (swy - A * swx) / sw;
  return { A, B };
}

function daysFromGenesis(ts) {
  return (ts - GENESIS_MS) / 86400000;
}
function fairValueAt(ts, A=JV_A, B=JV_B) {
  const d = daysFromGenesis(ts);
  return d > 0 ? Math.pow(10, A * Math.log10(d) + B) : 0;
}

// Band offsets — upper bands decay linearly over time (empirical fit)
// offset(days) = m * days + c  for 99.9%, 95%, 85%
// constant for 50%, 15%, 0.1%
// Upper bands: cap decay at today's day count (matches Excel MIN(days,today) fix)
// Without this, 99.9th crosses below 95th at ~day 9578 and 85th hits 50th at ~day 9171
const TODAY_DAYS = (Date.now() - GENESIS_MS) / 86400000;
function bandOffset(mSlope, cIntercept, ts) {
  const days = (ts - GENESIS_MS) / 86400000;
  // For decaying bands (m < 0), cap at today's value so projections don't collapse
  const effectiveDays = mSlope < 0 ? Math.min(days, TODAY_DAYS) : days;
  return mSlope * effectiveDays + cIntercept;
}

// BANDS with offset computed at current time (for gauge/quantile calc)
const BANDS = BAND_DEFS.map(b => ({ ...b, offset: bandOffset(b.m, b.c, Date.now()) }));

function bandPriceAt(ts, bandDef, A=JV_A, B=JV_B) {
  const offset = bandOffset(bandDef.m, bandDef.c, ts);
  return fairValueAt(ts, A, B) * Math.pow(10, offset);
}

function priceToQuantile(price, ts, A=JV_A, B=JV_B) {
  const fv = fairValueAt(ts, A, B);
  if (!fv || price <= 0) return 50;
  const res = Math.log10(price / fv);
  // Compute offsets fresh for the given timestamp (upper bands decay over time)
  const bands = BAND_DEFS.map(b => ({ ...b, offset: bandOffset(b.m, b.c, ts) }));
  // Interpolate between calibration points
  for (let i = 0; i < bands.length - 1; i++) {
    const hi = bands[i], lo = bands[i + 1];
    if (res <= hi.offset && res >= lo.offset) {
      const t = (res - lo.offset) / (hi.offset - lo.offset);
      return lo.q + t * (hi.q - lo.q);
    }
  }
  if (res > bands[0].offset) {
    // Above 99.9th — extrapolate
    const slope = (bands[0].q - bands[1].q) / (bands[0].offset - bands[1].offset);
    return Math.min(99.99, bands[0].q + slope * (res - bands[0].offset));
  }
  // Below 0.1st — extrapolate
  const slope = (bands[bands.length-2].q - bands[bands.length-1].q) /
                (bands[bands.length-2].offset - bands[bands.length-1].offset);
  return Math.max(0.01, bands[bands.length-1].q + slope * (res - bands[bands.length-1].offset));
}

function getTierAndSize(q) {
  // Clamp: q >= top tier's qMax → safest tier (index 0); q < bottom tier's qMin → riskiest (last)
  const tierIdx = LADDER.findIndex(t => q >= t.qMin && q < t.qMax);
  const idx = tierIdx >= 0 ? tierIdx : (q >= LADDER[0].qMax ? 0 : LADDER.length - 1);
  const tier = LADDER[idx];
  const pos = Math.max(0, Math.min(0.9999, (q - tier.qMin) / (tier.qMax - tier.qMin)));
  const size = tier.sizes[Math.min(tier.sizes.length - 1, Math.floor(pos * tier.sizes.length))];
  // Remainder goes to next rung UP (lower index = higher in ladder)
  const remainder = 100 - size;
  const splitTier = remainder > 0 && idx > 0 ? LADDER[idx - 1] : null;
  // If split has larger allocation, promote it to primary
  if (splitTier && remainder > size) {
    return { tier: splitTier, size: remainder, remainder: size, splitTier: tier };
  }
  return { tier, size, remainder, splitTier };
}

function fmt(n) {
  if (n >= 1e6) return "$" + (n/1e6).toFixed(2) + "M";
  if (n >= 1e3) return "$" + Math.round(n/1e3) + "K";
  return "$" + Math.round(n);
}
function fmtFull(n) { return "$" + Math.round(n).toLocaleString(); }


// ─────────────────────────────────────────────────────────────────────────────
// QUANTILE GAUGE
// ─────────────────────────────────────────────────────────────────────────────
function QuantileGauge({ q, todayTs, tierColor }) {
  // Pad top/bottom so extreme labels (99.9%, 0.1%) don't clip
  // Inner bar sits between PAD and GH-PAD, labels map proportionally into that range
  const GH = 280;
  const PAD = 10; // px padding top and bottom inside the bar area
  const BAR_H = GH - PAD * 2;
  const clr = tierColor || (() => { const {tier:t}=getTierAndSize(q); return t.color; })();
  const filled = BAR_H * (Math.min(100,Math.max(0,q))/100);

  // Map a quantile 0–100 to a top pixel within the GH container
  // 100 → PAD (top), 0 → GH-PAD (bottom)
  const qToTop = pct => PAD + BAR_H * (1 - Math.min(100,Math.max(0,pct)) / 100);

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"8px",paddingTop:"44px"}}>
      <div style={{fontSize:"12px",color:"#8aaac8",textTransform:"uppercase",letterSpacing:"0.1em"}}>Rank</div>
      <div style={{position:"relative",width:"32px",height:`${GH}px`}}>
        {/* Bar track */}
        <div style={{position:"absolute",top:`${PAD}px`,bottom:`${PAD}px`,left:"8px",right:"8px",
          background:"#070f1f",border:"1px solid #162840",borderRadius:"3px",overflow:"hidden"}}>
          <div style={{position:"absolute",bottom:0,left:0,right:0,
            height:`${filled}px`,background:clr,opacity:0.9,
            transition:"height 0.5s cubic-bezier(0.4,0,0.2,1)"}}/>
        </div>
        {/* Needle — sharp tick at exact current quantile */}
        <div style={{position:"absolute",left:"4px",right:"-4px",
          top:`${qToTop(q)}px`,transform:"translateY(-50%)",
          pointerEvents:"none",zIndex:2}}>
          <div style={{height:"2px",background:`linear-gradient(90deg,${clr},${clr}bb,transparent)`,
            borderRadius:"1px",boxShadow:`0 0 5px ${clr}88`}}/>
        </div>
        {/* Band tick marks — proportionally placed */}
        {BANDS.map(b=>{
          const bp = bandPriceAt(todayTs, b);
          const instrColor = getTierAndSize(b.q).tier.color;
          return (
            <div key={b.q} style={{position:"absolute",left:0,right:"-92px",
              top:`${qToTop(b.q)}px`,display:"flex",alignItems:"center",gap:"3px",
              transform:"translateY(-50%)"}}>
              <div style={{width:"8px",height:"1px",background:instrColor,opacity:0.9}}/>
              <div style={{width:"16px"}}/>
              <span style={{fontSize:"10px",color:instrColor,opacity:1,whiteSpace:"nowrap"}}>
                {b.label} {fmt(bp)}
              </span>
            </div>
          );
        })}
      </div>
      <div style={{fontSize:"26px",fontWeight:700,color:clr,marginTop:"4px"}}>
        {q.toFixed(1)}<span style={{fontSize:"13px",color:clr,opacity:0.7}}>%</span>
      </div>
    </div>
  );
}


// ─────────────────────────────────────────────────────────────────────────────
// INCOME CONVERTER
// Given a position in any instrument, compute equivalent STRC/EPD income
// Chain: Position Value → BTC equivalent → STRC shares → Annual Income
// Beta multipliers: IBIT=1x, IBIT LEAPs=2x, MSTR LEAPs=4x, MSTX LEAPs=8x
// ─────────────────────────────────────────────────────────────────────────────
const INCOME_INSTRUMENTS = [
  { name:"MSTX LEAPs",   beta:8,  color:"#ef4444", hint:"~8× BTC beta" },
  { name:"MSTR LEAPs",   beta:4,  color:"#f97316", hint:"~4× BTC beta" },
  { name:"IBIT LEAPs",   beta:2,  color:"#eab308", hint:"~2× BTC beta" },
  { name:"IBIT Shares",  beta:1,  color:"#22d3ee", hint:"~1,750 shares ≈ 1 BTC" },
];

const STRC_PAR    = 100;   // STRC trades near $100 par
const STRC_YIELD  = 0.115; // 11.5% current rate
const EPD_PAR     = 1;     // EPD is a regular stock ~$20s
const EPD_PRICE   = 40;    // approximate
const EPD_YIELD   = 0.10;  // ~7% yield

function IncomeConverter({ btcPrice, fairValue, activeTier }) {
  // Map active ladder tier → closest income instrument
  const tierToInstrument = (t) => {
    if (t === "MSTX LEAPs")  return "MSTX LEAPs";
    if (t === "MSTR LEAPs")  return "MSTR LEAPs";
    if (t === "IBIT LEAPs")  return "IBIT LEAPs";
    return "IBIT Shares"; // IBIT Shares, STRC, EPD → IBIT Shares as most relevant
  };
  const [instrument, setInstrument]   = useState(() => tierToInstrument(activeTier));

  // Sync to active tier when it changes (but don't override manual selection)
  const [userPicked, setUserPicked] = React.useState(false);
  React.useEffect(() => {
    if (!userPicked) setInstrument(tierToInstrument(activeTier));
  }, [activeTier, userPicked]);
  const [posValue,   setPosValue]     = useState("100000");
  const [strcPrice,  setStrcPrice]    = useState("100");
  const [strcRate,   setStrcRate]     = useState("11.5");
  const [epdPrice,   setEpdPrice]     = useState("40");
  const [epdYield,   setEpdYield]     = useState("10.0");
  const [marginPct,  setMarginPct]    = useState("50");    // % of position on margin
  const [marginRate, setMarginRate]   = useState("4.5");   // margin interest rate %
  const [callReq,    setCallReq]      = useState("60");    // margin call requirement %
  const [target,     setTarget]       = useState("STRC");

  const inst      = INCOME_INSTRUMENTS.find(i => i.name === instrument) || INCOME_INSTRUMENTS[0];
  const posVal    = parseFloat(posValue.replace(/[^0-9.]/g,"")) || 0;
  const strcPx    = parseFloat(strcPrice)  || 100;
  const strcRt    = parseFloat(strcRate)   / 100 || 0.115;
  const epdPx     = parseFloat(epdPrice)   || 40;
  const epdYld    = parseFloat(epdYield)   / 100 || 0.10;

  // Step 1: BTC-equivalent value (beta-adjusted notional)
  const btcEquiv  = posVal * inst.beta;

  // Step 2: # of BTC equivalent
  const btcCount  = btcPrice > 0 ? btcEquiv / btcPrice : 0;

  // Step 3: STRC conversion — use beta-adjusted notional (btcEquiv)
  const strcShares       = strcPx > 0 ? btcEquiv / strcPx : 0;
  const strcAnnualIncome = strcShares * strcPx * strcRt;
  const strcMonthly      = strcAnnualIncome / 12;

  // Step 4: EPD conversion — use beta-adjusted notional (btcEquiv)
  const epdShares        = epdPx > 0 ? btcEquiv / epdPx : 0;
  const epdAnnualIncome  = epdShares * epdPx * epdYld;
  const epdMonthly       = epdAnnualIncome / 12;

  // Fair Value gain calculation
  // When price >= FV, treat as already at FV with 1× beta (no leverage upside to model)
  const aboveFV     = btcPrice > 0 && fairValue > 0 && btcPrice >= fairValue;
  const effectiveBeta = aboveFV ? 1 : inst.beta;
  const btcToFvPct  = btcPrice > 0 && fairValue > 0 ? (fairValue / btcPrice - 1) : 0;
  const posGainPct  = aboveFV ? 0 : btcToFvPct * inst.beta;
  const posGainVal  = posVal * posGainPct;
  const fvPosValue  = aboveFV ? posVal : Math.max(0, posVal + posGainVal);
  // How many income shares at FV position value
  const fvStrcShares   = strcPx > 0 ? fvPosValue / strcPx : 0;
  const fvEpdShares    = epdPx  > 0 ? fvPosValue / epdPx  : 0;
  const fvStrcIncome   = fvStrcShares * strcPx * strcRt;
  const fvEpdIncome    = fvEpdShares  * epdPx  * epdYld;

  const isSTRC = target === "STRC";
  const incomeShares  = isSTRC ? strcShares  : epdShares;
  const annualIncome  = isSTRC ? strcAnnualIncome : epdAnnualIncome;
  const monthlyIncome = isSTRC ? strcMonthly : epdMonthly;
  const tgtPx         = isSTRC ? strcPx : epdPx;
  const tgtYield      = isSTRC ? strcRt : epdYld;
  const tgtColor      = isSTRC ? "#22c55e" : "#3b82f6";

  const fmtD = n => "$" + Math.round(n).toLocaleString();
  const fmtN = n => n >= 1000 ? (n/1000).toFixed(1)+"K" : Math.round(n).toLocaleString();

  const steps = [
    {
      label: "Position Value",
      value: fmtD(posVal),
      sub: `${inst.beta}× BTC beta`,
      color: inst.color,
    },
    {
      label: "BTC-Adj. Notional",
      value: fmtD(btcEquiv),
      sub: `${inst.beta}× notional on ${fmtD(posVal)}`,
      color: inst.color,
      arrow: true,
    },
    
    {
      label: `${target} Shares`,
      value: fmtN(incomeShares),
      sub: `@ ${fmtD(tgtPx)} par`,
      color: tgtColor,
      arrow: true,
    },
    {
      label: "Annual Income",
      value: fmtD(annualIncome),
      sub: `${fmtD(monthlyIncome)}/mo · ${(tgtYield*100).toFixed(1)}% yield`,
      color: tgtColor,
      highlight: true,
      arrow: true,
    },
  ];

  // FV gain card — separate from chain
  // Income from total deployed capital (equity + margin) at FV
  // marginDebt is already defined below but we need it here — compute inline
  const _marginDebt  = fvPosValue * (parseFloat(marginPct) / 100 || 0);
  const totalCapital = fvPosValue + _marginDebt;  // equity + borrowed
  const fvIncomeStrc = strcPx > 0 ? (totalCapital / strcPx) * strcPx * strcRt : 0;
  const fvIncomeEpd  = epdPx  > 0 ? (totalCapital / epdPx)  * epdPx  * epdYld : 0;
  const fvIncome     = isSTRC ? fvIncomeStrc : fvIncomeEpd;

  // Margin calculations (income sleeve only — STRC/EPD)
  const marginFrac     = parseFloat(marginPct)  / 100 || 0;
  const marginRateFrac = parseFloat(marginRate) / 100 || 0;
  const callReqFrac    = parseFloat(callReq)    / 100 || 0;
  const marginDebt     = fvPosValue * marginFrac;                     // $ borrowed at FV position value
  const marginCarry    = marginDebt * marginRateFrac;                // annual interest $
  const marginCallPx   = (1 - callReqFrac) > 0 ? (marginDebt / (1 - callReqFrac)) / ((fvPosValue + marginDebt) / tgtPx) : 0;
  const marginCallVal  = marginCallPx > 0 ? (marginCallPx / tgtPx) * fvPosValue : 0; // position value at call price
  const incomeCoversCarry = annualIncome > 0 && marginCarry > 0;
  const coverageRatio  = marginCarry > 0 ? fvIncome / marginCarry : null;
  const netAnnualIncome = fvIncome - marginCarry;  // full FV position income minus carry on borrowed portion
  const netMonthlyIncome = netAnnualIncome / 12;

  const gainShares = isSTRC ? fvStrcShares : fvEpdShares;
  const gainIncome = isSTRC ? fvStrcIncome : fvEpdIncome;

  const inputStyle = {
    background:"#070f1f", border:"1px solid #0f2a42", borderRadius:"4px",
    color:"#facc15", fontSize:"13px", fontFamily:"inherit", fontWeight:600,
    padding:"4px 8px", width:"90px", outline:"none", textAlign:"right",
  };

  return (
    <div style={{background:"#040c1a",border:"1px solid #0a1628",borderRadius:"5px",padding:"16px 18px",marginBottom:"12px"}}>
      <div style={{fontSize:"11px",color:"#5a8fc0",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"14px",fontWeight:600}}>
        Income Converter
      </div>

      {/* Controls row */}
      <div style={{display:"flex",gap:"16px",flexWrap:"wrap",marginBottom:"16px",alignItems:"flex-end"}}>

        {/* Instrument selector */}
        <div>
          <div style={{fontSize:"11px",color:"#8aaac8",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"5px"}}>instrument</div>
          <div style={{display:"flex",gap:"4px",flexWrap:"wrap",overflowX:"visible",paddingBottom:"0"}}>
            {INCOME_INSTRUMENTS.map(i=>(
              <button key={i.name} onClick={()=>{ setInstrument(i.name); setUserPicked(true); }} style={{
                background: i.name===instrument ? i.color+"22" : "transparent",
                border:`1px solid ${i.name===instrument ? i.color : i.color+"33"}`,
                borderRadius:"3px", color: i.name===instrument ? i.color : i.color+"99",
                fontSize:"10px", fontFamily:"inherit", fontWeight: i.name===instrument?700:400,
                padding:"4px 9px", cursor:"pointer",
              }}>
                {i.name} <span style={{opacity:0.6}}>{i.beta}×</span>
              </button>
            ))}
          </div>
        </div>

        {/* Position value */}
        <div>
          <div style={{fontSize:"11px",color:"#8aaac8",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"5px"}}>position value</div>
          <div style={{position:"relative",display:"inline-block"}}>
            <span style={{position:"absolute",left:"8px",top:"50%",transform:"translateY(-50%)",color:"#7a8fa8",fontSize:"13px"}}>$</span>
            <input value={posValue} onChange={e=>setPosValue(e.target.value.replace(/[^0-9]/g,""))}
              style={{...inputStyle, paddingLeft:"20px", width:"120px", textAlign:"left"}}/>
          </div>
        </div>

        {/* Target income instrument */}
        <div>
          <div style={{fontSize:"11px",color:"#8aaac8",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"5px"}}>convert to</div>
          <div style={{display:"flex",gap:"4px"}}>
            {["STRC","EPD"].map(t=>(
              <button key={t} onClick={()=>setTarget(t)} style={{
                background: t===target ? (t==="STRC"?"#22c55e22":"#3b82f622") : "transparent",
                border:`1px solid ${t===target?(t==="STRC"?"#22c55e":"#3b82f6"):(t==="STRC"?"#22c55e33":"#3b82f633")}`,
                borderRadius:"3px", color: t===target?(t==="STRC"?"#22c55e":"#3b82f6"):(t==="STRC"?"#22c55eaa":"#3b82f6aa"),
                fontSize:"10px", fontFamily:"inherit", fontWeight:t===target?700:400,
                padding:"4px 12px", cursor:"pointer",
              }}>{t}</button>
            ))}
          </div>
        </div>

        {/* Yield inputs */}
        <div>
          <div style={{fontSize:"11px",color:"#8aaac8",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"5px"}}>
            {isSTRC ? "STRC Price / Rate" : "EPD Price / Yield"}
          </div>
          <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
            <div style={{position:"relative",display:"inline-block"}}>
              <span style={{position:"absolute",left:"8px",top:"50%",transform:"translateY(-50%)",color:"#7a8fa8",fontSize:"13px"}}>$</span>
              <input value={isSTRC?strcPrice:epdPrice}
                onChange={e=>isSTRC?setStrcPrice(e.target.value.replace(/[^0-9.]/g,"")):setEpdPrice(e.target.value.replace(/[^0-9.]/g,""))}
                style={{...inputStyle,paddingLeft:"20px"}}/>
            </div>
            <div style={{position:"relative",display:"inline-block"}}>
              <input value={isSTRC?strcRate:epdYield}
                onChange={e=>isSTRC?setStrcRate(e.target.value.replace(/[^0-9.]/g,"")):setEpdYield(e.target.value.replace(/[^0-9.]/g,""))}
                style={inputStyle}/>
              <span style={{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",color:"#7a8fa8",fontSize:"13px"}}>%</span>
            </div>
          </div>
        </div>
      </div>

      {/* Chain visualization */}
      <div style={{display:"flex",alignItems:"stretch",gap:"0px",flexWrap:"wrap",gap:"2px"}}>
        {steps.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:"2px",flex:"1 1 auto",minWidth:"120px"}}>
            <div style={{
              flex:1, background: s.highlight ? s.color+"18" : "#070f1f",
              border:`1px solid ${s.highlight ? s.color+"66" : "#0a1628"}`,
              borderRadius:"5px", padding:"12px 14px",
              borderLeft: s.highlight ? `3px solid ${s.color}` : undefined,
            }}>
              <div style={{fontSize:"11px",color:"#8aaac8",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"4px"}}>{s.label}</div>
              <div style={{fontSize:"16px",fontWeight:700,color:s.color,lineHeight:1}}>{s.value}</div>
              <div style={{fontSize:"11px",color:"#7a9ab8",marginTop:"3px"}}>{s.sub}</div>
            </div>
            {i < steps.length-1 && (
              <div style={{fontSize:"16px",color:"#5a8fc0",flexShrink:0,padding:"0 2px"}}>→</div>
            )}
          </div>
        ))}
      </div>

      {/* Fair Value Gain Panel */}
      {btcPrice > 0 && fairValue > 0 && (
        <div style={{marginTop:"10px",background:"#070f1f",border:"1px solid #0a1628",borderRadius:"6px",padding:"14px 16px"}}>
          <div style={{fontSize:"12px",color:"#8aaac8",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"10px",display:"flex",alignItems:"center",gap:"8px",fontWeight:600}}>
            {aboveFV ? (
              <>
                <span>At current price</span>
                <span style={{color:"#facc15",fontWeight:700}}>{fmtD(btcPrice)}</span>
                <span style={{color:"#8aaac8"}}>above fair value</span>
                <span style={{color:"#ef4444",fontWeight:700,fontSize:"13px"}}>
                  ({(btcToFvPct*100).toFixed(1)}% to FV)
                </span>
              </>
            ) : (
              <>
                <span>At fair value</span>
                <span style={{color:"#22d3ee",fontWeight:700}}>{fmtD(fairValue)}</span>
                <span style={{color:"#8aaac8"}}>from {fmtD(btcPrice)}</span>
                <span style={{color:"#22c55e",fontWeight:700,fontSize:"13px"}}>
                  (+{(btcToFvPct*100).toFixed(1)}% BTC)
                </span>
              </>
            )}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"8px"}}>
            {[
              {
                label: aboveFV ? "above fair value" : "position gain",
                value: aboveFV ? fmtD(0) : fmtD(posGainVal),
                sub: aboveFV ? "already at or above FV" : `${posGainPct>=0?"+":""}${(posGainPct*100).toFixed(0)}% · ${inst.beta}× beta`,
                color: aboveFV ? "#334155" : "#22c55e",
              },
              {
                label: aboveFV ? "position value" : "value at FV",
                value: fmtD(fvPosValue),
                sub: aboveFV ? "1× beta assumed" : `up from ${fmtD(posVal)}`,
                color:"#f1f5f9",
              },
              {
                label: aboveFV ? "BTC equiv." : "BTC equiv. at FV",
                value: (aboveFV ? btcPrice : fairValue) > 0 ? (fvPosValue / (aboveFV ? btcPrice : fairValue)).toFixed(3) + " BTC" : "—",
                sub: aboveFV ? "at current price" : "fair value price",
                color:"#f7931a",
              },
              {
                label:`${target} Shares`,
                value: fmtN(gainShares),
                sub:`${fmtD(fvPosValue)} ÷ ${fmtD(tgtPx)} par`,
                color: tgtColor,
              },
              {
                label: aboveFV ? "annual income" : "Annual income at FV",
                value: fmtD(gainIncome),
                sub:`${fmtD(gainIncome/12)}/mo`,
                color: tgtColor,
              },
            ].map((c,i)=>(
              <div key={i} style={{background:"#040c1a",border:`1px solid ${c.color}22`,borderRadius:"4px",padding:"8px 10px"}}>
                <div style={{fontSize:"11px",color:"#8aaac8",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"4px"}}>{c.label}</div>
                <div style={{fontSize:"17px",fontWeight:700,color:c.color,lineHeight:1}}>{c.value}</div>
                <div style={{fontSize:"11px",color:"#7a9ab8",marginTop:"3px"}}>{c.sub}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Margin Panel — income sleeve only */}
      {(target === "STRC" || target === "EPD") && posVal > 0 && (
        <div style={{marginTop:"10px",background:"#070f1f",border:"1px solid #0f1e32",borderRadius:"6px",padding:"14px 16px"}}>
          <div style={{fontSize:"11px",color:"#5a8fc0",textTransform:"uppercase",letterSpacing:"0.12em",
            marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px",fontWeight:600}}>
            <span style={{color:"#8aaac8"}}>Margin Analysis</span>
            <span style={{color:"#334a5e",fontWeight:400}}>·</span>
            <span style={{color:"#8aaac8",fontWeight:400,fontSize:"11px"}}>Income Sleeve</span>
          </div>
          {/* Inputs row */}
          <div style={{display:"flex",gap:"10px",marginBottom:"14px",flexWrap:"wrap"}}>
            {[
              { label:"Margin %", val:marginPct, set:setMarginPct },
              { label:"Rate %",   val:marginRate, set:setMarginRate },
              { label:"Call Req %", val:callReq, set:setCallReq },
            ].map(f=>(
              <div key={f.label} style={{display:"flex",flexDirection:"column",gap:"5px"}}>
                <div style={{fontSize:"11px",color:"#8aaac8",textTransform:"uppercase",
                  letterSpacing:"0.06em",fontWeight:600}}>{f.label}</div>
                <div style={{display:"flex",alignItems:"center",background:"#040c1a",
                  border:"1px solid #162840",borderRadius:"4px",padding:"5px 10px",gap:"3px"}}>
                  <input value={f.val} onChange={e=>f.set(e.target.value.replace(/[^0-9.]/g,""))}
                    style={{background:"transparent",border:"none",outline:"none",color:"#e2e8f0",
                      fontSize:"14px",fontFamily:"inherit",fontWeight:700,width:"52px",textAlign:"right"}}/>
                  <span style={{fontSize:"12px",color:"#5a7fa0"}}>%</span>
                </div>
              </div>
            ))}
          </div>
          {/* Stats row */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"8px"}}>
            {[
              {
                label:"Margin Debt",
                value: fmtD(marginDebt),
                sub:`${marginPct}% of ${fmtD(fvPosValue)}`,
                color:"#f1f5f9",
              },
              {
                label:"Annual Carry",
                value: fmtD(marginCarry),
                sub:`${fmtD(marginCarry/12)}/mo interest`,
                color:"#ef4444",
              },
              {
                label:`Call @ ${callReq}%`,
                value: marginCallVal >= fvPosValue * 0.90 ? "⚠ TOO CLOSE" : fmtD(marginCallPx),
                sub: marginCallVal >= fvPosValue * 0.90
                  ? `strike ${fmtD(marginCallPx)} — within 10% of FV`
                  : `triggers at ${fmtD(marginCallVal)}`,
                color: marginCallVal >= fvPosValue * 0.90 ? "#ef4444" : "#f97316",
              },
              {
                label:`${target} w/ Margin`,
                value: fmtN(totalCapital / tgtPx),
                sub:`${fmtD(totalCapital)} total`,
                color: tgtColor,
              },
              {
                label:"Net Annual Income",
                value: fmtD(netAnnualIncome),
                sub:`${fmtD(fvIncome)} − ${fmtD(marginCarry)} carry`,
                color: netAnnualIncome >= 0 ? "#22c55e" : "#ef4444",
              },
            ].map((c,i)=>(
              <div key={i} style={{background:"#040c1a",border:`1px solid ${c.color}22`,
                borderRadius:"5px",padding:"10px 12px"}}>
                <div style={{fontSize:"11px",color:"#8aaac8",textTransform:"uppercase",
                  letterSpacing:"0.06em",marginBottom:"5px"}}>{c.label}</div>
                <div style={{fontSize:"17px",fontWeight:700,color:c.color,lineHeight:1}}>{c.value}</div>
                <div style={{fontSize:"11px",color:"#7a9ab8",marginTop:"4px"}}>{c.sub}</div>
              </div>
            ))}
          </div>
        </div>
      )}
      {/* Beta reference — 2 rows */}
      <div style={{marginTop:"12px",display:"flex",flexDirection:"column",gap:"5px"}}>
        {[[0,1],[2,3]].map((pair,ri)=>(
          <div key={ri} style={{display:"flex",gap:"20px",flexWrap:"wrap"}}>
            {pair.map(idx=>{
              const i=INCOME_INSTRUMENTS[idx];
              return (
                <div key={i.name} style={{display:"flex",alignItems:"center",gap:"5px"}}>
                  <div style={{width:"8px",height:"8px",borderRadius:"50%",background:i.color,opacity:0.7}}/>
                  <span style={{fontSize:"11px",color:"#8b9db0"}}>{i.name}</span>
                  <span style={{fontSize:"11px",color:i.color,fontWeight:700}}>{i.beta}×</span>
                  <span style={{fontSize:"11px",color:"#8aaac8"}}>{i.hint}</span>
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

// FORWARD PROJECTION TABLE
// ─────────────────────────────────────────────────────────────────────────────
function ForwardTable({ todayTs, modelA=JV_A, modelB=JV_B }) {
  // Safe date offset: always derive from todayTs, never mutate
  const offsetTs = (months=0, years=0) => {
    const d = new Date(todayTs);
    d.setFullYear(d.getFullYear() + years);
    d.setMonth(d.getMonth() + months);
    return d.getTime();
  };
  const cols = [
    { label:"1yr ago",  ts: offsetTs(0, -1) },

// ─────────────────────────────────────────────────────────────────────────────
// POWER LAW CHART (SVG)
// ─────────────────────────────────────────────────────────────────────────────
function PowerLawChart({ btcPrice, todayTs, liveHistory, modelA=JV_A, modelB=JV_B }) {
  const canvasRef = useRef(null);

  // Chart dimensions
  const W = 900, H = 420, PAD = {t:30, r:20, b:40, l:65};
  const cw = W - PAD.l - PAD.r, ch = H - PAD.t - PAD.b;

  // Time range: 2011-01-01 to +5 years
  const tMin = new Date("2011-01-01").getTime();
  const tMax = new Date(new Date().getFullYear() + 5, 11, 31).getTime();

  // Price range in log scale — tighter ceiling to reduce dead space
  const pMin = Math.log10(0.3);     // $0.30
  const pMax = Math.log10(1000000); // $1M

  const tx = ts => PAD.l + cw * (ts - tMin) / (tMax - tMin);
  const ty = logP => PAD.t + ch * (1 - (logP - pMin) / (pMax - pMin));

  // Build band curves (monthly resolution)
  const months = [];
  {
    const d = new Date(2011, 0, 1);
    const end = new Date(new Date().getFullYear() + 5, 11, 31);
    while (d <= end) {
      months.push(d.getTime());
      d.setMonth(d.getMonth() + 1);
    }
  }

  // Band fill areas (between adjacent bands)
  const bandFills = useMemo(() => {
    const fills = [];
    const bandPairs = [
      { upper: BAND_DEFS[0], lower: BAND_DEFS[1], color: "#b91c1c", opacity: 0.08 },
      { upper: BAND_DEFS[1], lower: BAND_DEFS[2], color: "#dc2626", opacity: 0.06 },
      { upper: BAND_DEFS[2], lower: BAND_DEFS[3], color: "#f97316", opacity: 0.06 },
      { upper: BAND_DEFS[3], lower: BAND_DEFS[4], color: "#22d3ee", opacity: 0.06 },
      { upper: BAND_DEFS[4], lower: BAND_DEFS[5], color: "#22c55e", opacity: 0.06 },
    ];
    for (const {upper, lower, color, opacity} of bandPairs) {
      let pathUp = "", pathDn = "";
      for (let i = 0; i < months.length; i++) {
        const ts = months[i];
        const pU = bandPriceAt(ts, upper, modelA, modelB);
        const pL = bandPriceAt(ts, lower, modelA, modelB);
        if (pU <= 0 || pL <= 0) continue;
        const x = tx(ts);
        const yU = ty(Math.log10(Math.min(pU, 1e6)));
        const yL = ty(Math.log10(pL));
        pathUp += (pathUp ? "L" : "M") + x.toFixed(1) + "," + yU.toFixed(1);
        pathDn = x.toFixed(1) + "," + yL.toFixed(1) + (pathDn ? "L" : "") + pathDn;
      }
      fills.push({ d: pathUp + "L" + pathDn + "Z", color, opacity });
    }
    return fills;
  }, [months, modelA, modelB]);

  // Band lines
  const bandLines = useMemo(() => {
    return BAND_DEFS.map(b => {
      let d = "";
      for (const ts of months) {
        const p = bandPriceAt(ts, b, modelA, modelB);
        if (p <= 0) continue;
        const x = tx(ts), y = ty(Math.log10(p));
        d += (d ? "L" : "M") + x.toFixed(1) + "," + y.toFixed(1);
      }
      return { ...b, d };
    });
  }, [months, modelA, modelB]);

  // Historical price line from seed + live data
  const pricePath = useMemo(() => {
    const pts = [];
    // Use BTC_HISTORY (monthly seed) for pre-live data
    for (const {days, price} of BTC_HISTORY) {
      const ts = GENESIS_MS + days * 86400000;
      if (ts >= tMin && ts <= tMax && price > 0) {
        pts.push([ts, price]);
      }
    }
    // Overlay live data — downsample daily to weekly to match seed density
    if (liveHistory) {
      const weekMs = 7 * 86400000;
      const buckets = new Map();
      for (const [ts, price] of liveHistory) {
        if (ts >= tMin && ts <= tMax && price > 0) {
          const weekKey = Math.floor(ts / weekMs);
          const existing = buckets.get(weekKey);
          // Keep the last data point in each week
          if (!existing || ts > existing[0]) buckets.set(weekKey, [ts, price]);
        }
      }
      for (const [, pt] of buckets) pts.push(pt);
    }
    // Sort and deduplicate: keep one point per ~7-day window
    pts.sort((a,b) => a[0] - b[0]);
    const deduped = [];
    for (const pt of pts) {
      if (deduped.length === 0 || pt[0] - deduped[deduped.length-1][0] > 5*86400000) {
        deduped.push(pt);
      }
    }
    // Build smooth SVG path using Catmull-Rom → cubic bezier conversion
    if (deduped.length < 2) return "";
    const points = deduped.map(([ts, price]) => [tx(ts), ty(Math.log10(price))]);
    let d = `M${points[0][0].toFixed(1)},${points[0][1].toFixed(1)}`;
    for (let i = 0; i < points.length - 1; i++) {
      const p0 = points[Math.max(0, i - 1)];
      const p1 = points[i];
      const p2 = points[i + 1];
      const p3 = points[Math.min(points.length - 1, i + 2)];
      // Catmull-Rom to cubic bezier control points (tension=0.5)
      const cp1x = p1[0] + (p2[0] - p0[0]) / 6;
      const cp1y = p1[1] + (p2[1] - p0[1]) / 6;
      const cp2x = p2[0] - (p3[0] - p1[0]) / 6;
      const cp2y = p2[1] - (p3[1] - p1[1]) / 6;
      d += ` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
    }
    return d;
  }, [liveHistory]);

  // Y-axis labels
  const yLabels = [1, 10, 100, 1000, 10000, 100000, 1000000];

  // X-axis labels
  const xLabels = [];
  for (let yr = 2012; yr <= new Date().getFullYear() + 5; yr += 2) {
    const ts = new Date(yr, 0, 1).getTime();
    if (ts >= tMin && ts <= tMax) xLabels.push({ yr, ts });
  }

  // Today marker
  const todayX = tx(todayTs);
  const priceY = btcPrice > 0 ? ty(Math.log10(btcPrice)) : null;

  return (
    <div style={{background:"#040c1a",border:"1px solid #0a1628",borderRadius:"6px",padding:"16px 18px",marginTop:"14px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
        <div style={{fontSize:"11px",color:"#5a8fc0",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:600}}>
          Power Law Bands
        </div>
        {/* Legend */}
        <div style={{display:"flex",gap:"10px",flexWrap:"wrap",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:"3px"}}>
            <div style={{width:"12px",height:"2px",background:"#f1f5f9",borderRadius:"1px"}}/>
            <span style={{fontSize:"10px",color:"#8aaac8"}}>BTC</span>
          </div>
          {BAND_DEFS.map(b => (
            <div key={b.q} style={{display:"flex",alignItems:"center",gap:"3px"}}>
              <div style={{width:"12px",height:"2px",background:b.color,borderRadius:"1px",opacity:0.8}}/>
              <span style={{fontSize:"10px",color:b.color,opacity:0.85}}>{b.label}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{overflowX:"auto"}}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:`${W}px`,height:"auto",display:"block"}}>
          {/* Background */}
          <rect x={PAD.l} y={PAD.t} width={cw} height={ch} fill="#070f1f" rx="2"/>

          {/* Grid lines */}
          {yLabels.map(v => {
            const y = ty(Math.log10(v));
            return y >= PAD.t && y <= PAD.t + ch ? (
              <line key={v} x1={PAD.l} x2={PAD.l+cw} y1={y} y2={y} stroke="#0d1e30" strokeWidth="0.5"/>
            ) : null;
          })}

          {/* Band fills */}
          {bandFills.map((f,i) => (
            <path key={i} d={f.d} fill={f.color} opacity={f.opacity}/>
          ))}

          {/* Band lines */}
          {bandLines.map(b => (
            <path key={b.q} d={b.d} fill="none" stroke={b.color} strokeWidth={b.w}
              strokeDasharray={b.dash} opacity={0.7}/>
          ))}

          {/* Historical price line */}
          <path d={pricePath} fill="none" stroke="#f1f5f9" strokeWidth="1.2" opacity="0.85"/>

          {/* Today vertical line */}
          <line x1={todayX} x2={todayX} y1={PAD.t} y2={PAD.t+ch}
            stroke="#22d3ee" strokeWidth="0.5" strokeDasharray="3,3" opacity="0.4"/>
          <text x={todayX} y={PAD.t-6} fill="#22d3ee" fontSize="9" textAnchor="middle" opacity="0.6">TODAY</text>

          {/* Current price dot */}
          {priceY !== null && priceY >= PAD.t && priceY <= PAD.t+ch && (
            <>
              <circle cx={todayX} cy={priceY} r="4" fill="#facc15" stroke="#020817" strokeWidth="1.5"/>
              <text x={todayX} y={priceY - 10} fill="#facc15" fontSize="10" fontWeight="700" textAnchor="middle">
                {fmtFull(btcPrice)}
              </text>
            </>
          )}

          {/* Y-axis labels */}
          {yLabels.map(v => {
            const y = ty(Math.log10(v));
            return y >= PAD.t && y <= PAD.t + ch ? (
              <text key={v} x={PAD.l-6} y={y+3} fill="#5a8fc0" fontSize="10" textAnchor="end">
                {v >= 1e6 ? "$"+v/1e6+"M" : v >= 1e3 ? "$"+v/1e3+"K" : "$"+v}
              </text>
            ) : null;
          })}

          {/* X-axis labels */}
          {xLabels.map(({yr,ts}) => (
            <text key={yr} x={tx(ts)} y={PAD.t+ch+16} fill="#5a8fc0" fontSize="10" textAnchor="middle">{yr}</text>
          ))}
        </svg>
      </div>
    </div>
  );
}

function BTCPowerLaw() {
  const today   = useMemo(()=>new Date(),[]);
  const todayTs = today.getTime();


  const [priceStr,  setPriceStr]  = useState("85000");
  const [livePrice, setLivePrice] = useState(null);
  const [liveFetch, setLiveFetch] = useState("fetching…");
  const [liveUpdatedAt, setLiveUpdatedAt] = useState(null);
  const [liveHistory, setLiveHistory] = useState(null);

  // EMA model: halfLifeYears=0 means Kaim fixed model
  const [halfLifeYears, setHalfLifeYears] = useState(0);
  const { A: modelA, B: modelB } = useMemo(() => {
    if (halfLifeYears === 0) return { A: JV_A, B: JV_B };
    return fitEMA(halfLifeYears * 365);
  }, [halfLifeYears]);
  const isJV = halfLifeYears === 0;

  // Fetch live BTC price + history
  useEffect(()=>{
    async function fetchPrice(){
      try {
        const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");
        if(!res.ok) throw new Error();
        const j = await res.json();
        const p = j?.bitcoin?.usd;
        if(p){
          setLivePrice(p);
          setPriceStr(Math.round(p).toString());
          setLiveFetch("live");
          setLiveUpdatedAt(new Date());
        }
      } catch(_){
        setLiveFetch("unavailable");
      }
    }
    async function fetchHistory(){
      try {
        const res = await fetch("https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=365&interval=daily");
        if(!res.ok) throw new Error();
        const j = await res.json();
        if(j?.prices?.length > 100){
          // Merge: seed covers pre-2024, live covers last 365 days
          const liveStart = j.prices[0][0];
          const seedOld = SEED_PRICES.map(([ym,p])=>[new Date(ym+"-01").getTime(),p]).filter(([ts])=>ts < liveStart);
          setLiveHistory([...seedOld, ...j.prices]);
        }
      } catch(_){ /* fall back to seed */ }
    }
    fetchPrice();
    fetchHistory();
  },[]);

  const price = parseFloat(priceStr.replace(/[^0-9.]/g,""))||0;
  const fv    = fairValueAt(todayTs, modelA, modelB);
  const q     = priceToQuantile(price, todayTs, modelA, modelB);
  const {tier, size, remainder, splitTier} = getTierAndSize(q);
  const displayName = (name) => name === "STRC" ? "STRC Shares" : name === "EPD" ? "EPD Shares" : name;

  // ─── Alerts (Pushover) ────────────────────────────────────────────────────
  const [alertsOn,  setAlertsOn]  = useState(false);
  const [alertSent, setAlertSent] = useState(false);
  const [lightMode,  setLightMode]  = useState(false);

  // Inject/remove light mode CSS override on <head>
  useEffect(() => {

    if (s) return;
    s = document.createElement('style');
    s.id = id;
    // Map structural dark colors → light equivalents
    // Instrument accent colors (red/orange/yellow/cyan/green/blue) are untouched
    s.textContent = `
      body { background: #f0f4f8 !important; }
      /* Page / outer wrapper */
      #root [style*="background: rgb(2, 8, 23)"],
      #root [style*="background: rgb(2,8,23)"]          { background: #f0f4f8 !important; }

      /* Inner card #040c1a */
      #root [style*="background: rgb(4, 12, 26)"]        { background: #dde7f2 !important; }

      #root [style*="color: rgb(74, 122, 148)"]          { color: #1a4a64 !important; }
      #root [style*="color: rgb(58, 90, 112)"]           { color: #0a3a54 !important; }
      #root [style*="color: rgb(74, 106, 128)"]          { color: #1a4060 !important; }
      #root [style*="color: rgb(148, 184, 208)"]         { color: #1a5070 !important; }
      #root [style*="color: rgb(148, 163, 184)"]         { color: #445566 !important; }
      #root [style*="color: rgb(138, 184, 216)"]         { color: #1a5070 !important; }
      /* Bright text */
      #root [style*="color: rgb(241, 245, 249)"]         { color: #0f1e2d !important; }
      #root [style*="color: rgb(226, 232, 240)"]         { color: #1a2a3a !important; }
      #root [style*="color: rgb(200, 216, 232)"]         { color: #1a3a50 !important; }
      /* Price input bg */
      #root input[style*="background: rgb(7, 15, 31)"]   { background: #e4ecf4 !important; color: #1a2a3a !important; }
      #root input[style*="background: rgb(4, 12, 26)"]   { background: #dde7f2 !important; color: #1a2a3a !important; }
    `;
    document.head.appendChild(s);
  }, [lightMode]);
  const prevTierRef = useRef(null);
  const prevSizeRef = useRef(null);

  // Build the full notification message including short leg guidance
  const buildAlertMessage = (tierName, sz, splitName, splitSz, btcPrice, quantilePct) => {
    const parts = [];

    // Line 1: market snapshot
    const priceStr = btcPrice ? 'Bitcoin $' + Math.round(btcPrice).toLocaleString() : '';
    const qStr = quantilePct != null ? 'Quantile ' + quantilePct.toFixed(1) + '%' : '';
    parts.push([priceStr, qStr].filter(Boolean).join('  ·  '));

    // Active position
    let posLines = ['<b>Active Position</b>'];
    if (splitName && splitSz > 0) {
      const t = LADDER.find(l=>l.name===tierName);
      const s = LADDER.find(l=>l.name===splitName);
      // Safer instrument (higher qMin) = scaling in. Riskier (lower qMin) = scaling out.
      const tierIsSafer = t && s && t.qMin > s.qMin;
      posLines.push(`${displayName(tierName)}  <b>${sz}%</b>  <i>${tierIsSafer ? 'scaling in' : 'scaling out'}</i>`);
      posLines.push(`${displayName(splitName)}  <b>${splitSz}%</b>  <i>${tierIsSafer ? 'scaling out' : 'scaling in'}</i>`);
    } else {
      posLines.push(`${displayName(tierName)}  <b>${sz}%</b>`);
    }
    parts.push(posLines.join('\n'));

    // Short leg
    // At 100% with no split = fully in = Initiate. Only "Roll" when scaling out (size < 100, split is riskier)
    const primaryScalingIn = !splitName || sz === 100 || (() => {
      const t = LADDER.find(l=>l.name===tierName);
      const s = LADDER.find(l=>l.name===splitName);
      return s && t && s.qMin < t.qMin;
    })();

    const shortLegRows = [];
    const collectShortLeg = (name, alloc, scalingIn) => {
      if (!SHORT_LEG[name]) return;
      const cfg = scalingIn
        ? SHORT_LEG[name][0]
        : SHORT_LEG[name].find(s=>s.size===alloc)
          || SHORT_LEG[name].reduce((a,b)=>Math.abs(b.size-alloc)<Math.abs(a.size-alloc)?b:a);
      shortLegRows.push({ name, action: scalingIn ? 'Initiate' : 'Roll', delta: cfg.delta, expiry: cfg.expiry });
    };

    collectShortLeg(tierName, sz, primaryScalingIn);
    if (splitName && splitSz > 0 && SHORT_LEG[splitName]) {
      const t = LADDER.find(l=>l.name===tierName);
      const s = LADDER.find(l=>l.name===splitName);
      collectShortLeg(splitName, splitSz, s && t && s.qMin > t.qMin);
    }

    if (shortLegRows.length > 0) {
      let slLines = ['<b>Short Leg</b>'];
      shortLegRows.forEach(({name, action, delta, expiry}) => {
        slLines.push(`${name}  <b>${action}</b>  Δ${delta}  ·  ${expiry}`);
      });
      parts.push(slLines.join('\n'));
    }

    return parts.join('\n\n');
  };

  useEffect(() => {
    if (!alertsOn) return;
    const prevTier = prevTierRef.current;
    const prevSize = prevSizeRef.current;
    const changed  = prevTier !== null && (prevTier !== tier.name || prevSize !== size);
    if (changed) {
      const splitName = splitTier?.name || null;
      const splitSz   = remainder || 0;
      const title = prevTier !== tier.name
        ? `${displayName(prevTier)} → ${displayName(tier.name)}`
        : `${displayName(tier.name)}: ${prevSize}% → ${size}%`;
      const message = buildAlertMessage(tier.name, size, splitName, splitSz, price, q);
      // Call Pushover API directly (supports CORS)
      const formData = new FormData();
      formData.append('token',   'a954fkhqk7cyphb64kyt6eikbmgpau');
      formData.append('user',    'ub8xj2eks26ewu6dv9hubmri5rqswv');
      formData.append('title',   '🪜 ' + title);
      formData.append('message', message);
      formData.append('sound',   'cashregister');
      formData.append('html',    '1');
      fetch('https://api.pushover.net/1/messages.json', {
        method: 'POST',
        body: formData,
      }).then(r => r.json()).then(d => { if (d.status===1) setAlertSent(true); });
    }
    prevTierRef.current = tier.name;
    prevSizeRef.current = size;
  }, [tier.name, size, alertsOn]);

  const toggleAlerts = () => {
    if (!alertsOn) {
      setAlertsOn(true);
      prevTierRef.current = tier.name;
      prevSizeRef.current = size;
    } else {
      setAlertsOn(false);
    }
  };
  const devPct = (price>0&&fv>0)?((price/fv-1)*100).toFixed(1):"0.0";

  const PRESETS = useMemo(()=>{
    const base=[];
    for(let p=62500;p<=250000;p+=12500) base.push(p);
    return base;
  },[]);

  const bandRows = BANDS.map(b=>{
    const bp=bandPriceAt(todayTs, b, modelA, modelB);
    return {...b,bprice:bp,above:bp>price,
      pctAway:price>0?((bp/price-1)*100).toFixed(1):"—"};
  });

  // Highlight only the single nearest band above and nearest band below current price
  const bandsAbove = bandRows.filter(b=>b.above).sort((a,b)=>a.bprice-b.bprice);
  const bandsBelow = bandRows.filter(b=>!b.above).sort((a,b)=>b.bprice-a.bprice);
  const nearestAboveQ = bandsAbove.length > 0 ? bandsAbove[0].q : null;
  const nearestBelowQ = bandsBelow.length > 0 ? bandsBelow[0].q : null;

      {/* HEADER */}

            <div style={{display:"flex",alignItems:"baseline",gap:"12px"}}>
              <h1 style={{margin:0,fontSize:"20px",fontWeight:700,letterSpacing:"0.14em",
                color:"#f1f5f9",textTransform:"uppercase"}}>BTC Quantile Ladder</h1>
              <span style={{fontSize:"11px",color:"#5a8fc0",letterSpacing:"0.08em",fontWeight:500}}>
                Kaim Power Law Model
              </span>
            </div>
            <div style={{height:"1px",
              background:"linear-gradient(90deg,#22d3ee 0%,#eab308 35%,#f97316 60%,transparent 85%)",marginTop:"8px",opacity:0.7}}/>
          </div>
          <div style={{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:"11px",padding:"2px 8px",borderRadius:"3px",
              background:liveFetch==="live"?"#052e16":"#1c1700",
              color:liveFetch==="live"?"#22c55e":"#eab308",
              border:`1px solid ${liveFetch==="live"?"#14532d":"#3d2e00"}`}}>
              {liveFetch==="live"?"● LIVE PRICE":"⚠ PRICE MANUAL"}
            </span>
            {liveUpdatedAt && (
              <span style={{fontSize:"10px",color:"#5a7fa0",letterSpacing:"0.04em"}}>
                {liveUpdatedAt.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}
              </span>
            )}
            <span style={{fontSize:"12px",color:"#8ac0d8"}}>
              {today.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
            </span>
          </div>
        </div>

        {/* EMA MODEL SELECTOR */}
        <div style={{marginTop:"10px",display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>          <span style={{fontSize:"11px",color:"#94b8d0",textTransform:"uppercase",letterSpacing:"0.1em",marginRight:"2px"}}>Model</span>
          {[["standard",0],["weighted",isJV?5:halfLifeYears]].map(([label,val])=>(
            <button key={label} onClick={()=>setHalfLifeYears(val)} style={{
              fontSize:"11px",fontFamily:"inherit",fontWeight:700,letterSpacing:"0.06em",
              textTransform:"uppercase",padding:"4px 10px",borderRadius:"4px",cursor:"pointer",
              background:(label==="standard"?isJV:!isJV)?"#0c2040":"transparent",
              border:`1px solid ${(label==="standard"?isJV:!isJV)?"#1e5f8a":"#0f2133"}`,
              color:(label==="standard"?isJV:!isJV)?"#7dd3fc":"#334155"}}>{label}</button>
          ))}
          {!isJV && (
            <div style={{display:"flex",alignItems:"center",gap:"8px",marginLeft:"4px"}}>
              <span style={{fontSize:"10px",color:"#8aaac8",whiteSpace:"nowrap"}}>
                FV <span style={{color:"#22d3ee",fontWeight:700}}>{fmt(fv)}</span>
                <span style={{color:"#3a5a78",fontSize:"10px"}}> vs Standard </span>
                <span style={{color:"#22d3ee",fontWeight:700,opacity:0.55}}>{fmt(fairValueAt(todayTs,JV_A,JV_B))}</span>
              </span>
              <div style={{display:"flex",alignItems:"center",gap:"10px",background:"#040c1a",
                border:"1px solid #1a3a5c",borderRadius:"6px",padding:"5px 12px"}}>
                <span style={{fontSize:"11px",color:"#8aaac8",whiteSpace:"nowrap",fontWeight:500}}>Recent</span>
                <div style={{position:"relative",display:"flex",alignItems:"center",width:"120px",height:"20px"}}>
                  <div style={{position:"absolute",left:0,right:0,height:"3px",
                    background:"#0d1e30",borderRadius:"3px"}}/>
                  <div style={{position:"absolute",left:0,
                    width:`${((halfLifeYears-1)/16)*100}%`,
                    height:"3px",background:"#22d3ee",borderRadius:"3px",opacity:0.75}}/>
                  <input type="range" min="1" max="17" step="1" value={halfLifeYears}
                    onChange={e=>setHalfLifeYears(parseInt(e.target.value))}
                    style={{position:"absolute",left:0,right:0,width:"100%",
                      appearance:"none",WebkitAppearance:"none",
                      background:"transparent",cursor:"pointer",margin:0,height:"20px"}}/>
                </div>
                <span style={{fontSize:"11px",color:"#8aaac8",whiteSpace:"nowrap",fontWeight:500}}>Historical</span>
                <span style={{fontSize:"12px",color:"#22d3ee",fontWeight:700,
                  minWidth:"28px",textAlign:"right",letterSpacing:"0.04em"}}>
                  {halfLifeYears}yr
                </span>
              </div>
            </div>
          )}
          {/* Alert bell + theme toggle */}
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:"4px"}}>
            <button onClick={()=>setLightMode(m=>!m)}

              {lightMode ? "🌙" : "☀️"}

            <button onClick={toggleAlerts}

              style={{background:"transparent",border:"none",cursor:"pointer",
                padding:"4px 6px",fontSize:"18px",lineHeight:1,

      </div>

      {/* PRICE INPUT */}
      <div style={{marginBottom:"16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px",flexWrap:"wrap"}}>
          <span style={{fontSize:"13px",color:"#a0b8cc",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:600}}>Price</span>
          {/* −5K button */}
          <button onClick={()=>setPriceStr(p=>String(Math.max(1000,(parseInt(p)||0)-5000)))}
            style={{background:"#070f1f",border:"1px solid #0f2a42",borderRadius:"4px",
              color:"#8aaac8",fontSize:"15px",fontFamily:"inherit",fontWeight:700,
              padding:"6px 12px",cursor:"pointer",lineHeight:1}}>−5K</button>
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:"10px",top:"50%",transform:"translateY(-50%)",

          {/* +5K button */}

              padding:"6px 12px",cursor:"pointer",lineHeight:1}}>+5K</button>
          {livePrice&&(
            <button onClick={()=>setPriceStr(Math.round(livePrice).toString())} style={{
              background:"#052e16",border:"1px solid #14532d",borderRadius:"3px",
              color:"#22c55e",fontSize:"12px",fontFamily:"inherit",padding:"6px 10px",cursor:"pointer"}}>
              ● Live {fmt(livePrice)}
            </button>
          )}
        </div>
        {/* Preset buttons */}
        <div style={{display:"flex",gap:"4px",flexWrap:"wrap",overflowX:"visible",paddingBottom:"0"}}>
          {PRESETS.map(p=>(
            <button key={p} onClick={()=>setPriceStr(String(p))} style={{
              background:Math.abs(price-p)<500?"#0c2040":"transparent",
              border:`1px solid ${Math.abs(price-p)<500?"#1e5f8a":"#162840"}`,
              borderRadius:"3px",color:Math.abs(price-p)<500?"#7dd3fc":"#4a7a9b",
              fontSize:"12px",fontFamily:"inherit",padding:"4px 8px",cursor:"pointer"}}>
              {fmt(p)}
            </button>
          ))}
        </div>
      </div>

      {/* MAIN CONTENT */}
      <div style={{display:"flex",flexDirection:"column",gap:"11px",marginBottom:"14px"}}>

          {/* 4 stat cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px"}}>
            {[
              {label:"price", value:fmtFull(price||0),                              color:"#facc15"},
              {label:"fair value",value:fmtFull(fv),                                    color:"#22d3ee"},
              {label:"vs fair value", value:`${parseFloat(devPct)>0?"+":""}${devPct}%`,      color:parseFloat(devPct)>0?"#ef4444":"#22c55e"},
              {label:"quantile",      value:`${q.toFixed(1)}%`,                             color:tier.color},
            ].map(s=>(
              <div key={s.label} style={{
                background: s.label==="vs fair value" ? (parseFloat(devPct)>0?"#150404":"#041209") : s.label==="quantile" ? tier.darkBg : "#070f1f",
                border: s.label==="vs fair value" ? `1px solid ${parseFloat(devPct)>0?"#2d0808":"#0a2518"}` : s.label==="quantile" ? `1px solid ${tier.color}30` : "1px solid #0f2035",
                borderRadius:"6px",padding:"14px 16px",
                boxShadow: s.label==="quantile" ? `0 0 20px ${tier.color}11` : "none"}}>
                <div style={{fontSize:"10px",color:"#5a8fc0",textTransform:"uppercase",
                  letterSpacing:"0.12em",marginBottom:"6px",fontWeight:600}}>{s.label}</div>
                <div style={{fontSize:"22px",fontWeight:700,color:s.color,letterSpacing:"-0.01em"}}>{s.value}</div>
              </div>
            ))}
          </div>

          {/* Tier card */}
          <div style={{background:tier.darkBg,border:`1px solid ${tier.color}25`,
            borderLeft:`4px solid ${tier.color}`,borderRadius:"6px",padding:"16px 20px",
            boxShadow:`-4px 0 24px ${tier.color}15, inset 1px 0 0 ${tier.color}08`}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"16px"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:"10px",color:"#5a8fc0",textTransform:"uppercase",
                  letterSpacing:"0.12em",marginBottom:"6px",fontWeight:600}}>Active Instrument</div>
                <div style={{fontSize:"28px",fontWeight:700,color:tier.color,
                  lineHeight:1,letterSpacing:"0.02em"}}>{displayName(tier.name)}</div>
                {tier.typeNote && (
                  <div style={{display:"inline-flex",alignItems:"center",gap:"6px",marginTop:"5px",marginBottom:"5px"}}>
                    {tier.typeNote.split(" · ").map((note, i) => (
                      <span key={i} style={{
                        fontSize:"11px", fontWeight:600, letterSpacing:"0.07em",
                        textTransform:"uppercase", color:tier.color,
                        background:tier.color+"18", border:`1px solid ${tier.color}40`,
                        borderRadius:"3px", padding:"2px 6px"
                      }}>{note}</span>
                    ))}
                  </div>
                )}
                <div style={{fontSize:"13px",color:"#b0c4d8",marginTop:"3px"}}>{tier.desc}</div>
                <div style={{fontSize:"12px",color:"#7aaac8",marginTop:"4px"}}>
                  Max APR: <span style={{color:"#d0dde8",fontWeight:600}}>{tier.debt}</span>
                </div>
                <div style={{marginTop:"10px",display:"flex",gap:"4px",flexWrap:"wrap",overflowX:"visible",paddingBottom:"0",alignItems:"center"}}>
                  <span style={{fontSize:"11px",color:"#8aaac8",textTransform:"uppercase",
                    letterSpacing:"0.08em",marginRight:"2px"}}>Size:</span>
                  {tier.sizes.map((s,i)=>(
                    <div key={i} style={{padding:"2px 8px",borderRadius:"3px",fontSize:"12px",
                      fontWeight:s===size?700:400,
                      background:s===size?tier.color+"22":"transparent",
                      border:`1px solid ${s===size?tier.color:tier.color+"55"}`,
                      color:s===size?tier.color:tier.color+"99"}}>{s}%</div>
                  ))}
                </div>
              </div>
              {/* Allocation circles */}
              <div style={{display:"flex",gap:"10px",alignItems:"center",flexShrink:0}}>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:"10px",color:"#8aaac8",textTransform:"uppercase",
                    letterSpacing:"0.08em",marginBottom:"5px"}}>{displayName(tier.name)}</div>
                  <div style={{width:"68px",height:"68px",borderRadius:"50%",
                    border:`3px solid ${tier.color}`,display:"flex",alignItems:"center",
                    justifyContent:"center",background:tier.darkBg}}>
                    <div style={{fontSize:"22px",fontWeight:700,color:tier.color}}>{size}%</div>
                  </div>
                </div>
                {splitTier&&remainder>0&&(
                  <>
                    <div style={{fontSize:"16px",color:"#5a8fc0"}}>+</div>
                    <div style={{textAlign:"center"}}>
                      <div style={{fontSize:"10px",color:"#8aaac8",textTransform:"uppercase",
                        letterSpacing:"0.08em",marginBottom:"5px"}}>{displayName(splitTier.name)}</div>
                      <div style={{width:"68px",height:"68px",borderRadius:"50%",
                        border:`3px solid ${splitTier.color}`,display:"flex",alignItems:"center",
                        justifyContent:"center",background:splitTier.darkBg}}>
                        <div style={{fontSize:"22px",fontWeight:700,color:splitTier.color}}>{remainder}%</div>
                      </div>
                    </div>
                  </>
                )}
              </div>
            </div>
            <div style={{marginTop:"12px",display:"flex",gap:"5px",overflowX:"auto",
              WebkitOverflowScrolling:"touch",scrollbarWidth:"none",paddingBottom:"2px"}}>
              {LADDER.slice().reverse().map(t=>{
                const active=t.name===tier.name;
                const isSplit=splitTier&&t.name===splitTier.name;
                return <div key={t.name} style={{padding:"3px 9px",borderRadius:"3px",fontSize:"11px",
                  border:`1px solid ${active||isSplit?t.color:t.color+"55"}`,
                  color:active||isSplit?t.color:t.color+"88",
                  background:active?t.darkBg:isSplit?t.darkBg:"transparent",
                  fontWeight:active||isSplit?700:400,
                  boxShadow:active?`0 0 8px ${t.color}55`:isSplit?`0 0 4px ${t.color}33`:"none"}}>
                  {displayName(t.name)}{active&&<span style={{marginLeft:"5px",fontWeight:400,opacity:0.8}}>{size}%</span>}{isSplit&&<span style={{marginLeft:"5px",fontWeight:400,opacity:0.8}}>{remainder}%</span>}
                </div>;
              })}
            </div>
          </div>

          {/* Short Leg Guidance */}
          {(() => {
            const rows = [];
            const primaryScalingIn = !splitTier || size === 100 || splitTier.qMin < tier.qMin;
            if (SHORT_LEG[tier.name]) {
              const cfg = primaryScalingIn
                ? SHORT_LEG[tier.name][0]
                : SHORT_LEG[tier.name].find(s=>s.size===size)
                  || SHORT_LEG[tier.name].reduce((a,b)=>Math.abs(b.size-size)<Math.abs(a.size-size)?b:a);
              rows.push({t:tier, cfg, scalingIn:primaryScalingIn});
            }
            if (splitTier && remainder>0 && SHORT_LEG[splitTier.name]) {
              const splitScalingIn = splitTier.qMin > tier.qMin;
              const cfg2 = splitScalingIn
                ? SHORT_LEG[splitTier.name][0]
                : SHORT_LEG[splitTier.name].find(s=>s.size===remainder)
                  || SHORT_LEG[splitTier.name].reduce((a,b)=>Math.abs(b.size-remainder)<Math.abs(a.size-remainder)?b:a);
              rows.push({t:splitTier, cfg:cfg2, scalingIn:splitScalingIn});
            }
            if (rows.length===0) return null;
            return (
              <div style={{display:"flex",flexDirection:"column",gap:"8px",marginTop:"8px"}}>
                {rows.map(({t,cfg,scalingIn})=>{
                  const isInitiate = scalingIn || cfg.action==="Initiate";
                  return (
                    <div key={t.name} style={{
                      background:t.darkBg,
                      border:`1px solid ${t.color}30`,
                      borderLeft:`3px solid ${t.color}`,
                      borderRadius:"6px",padding:"12px 16px"}}>
                      {/* Header row */}
                      <div style={{display:"flex",alignItems:"center",
                        justifyContent:"space-between",marginBottom:"8px"}}>
                        <div>
                          <div style={{fontSize:"10px",color:"#8aaac8",textTransform:"uppercase",
                            letterSpacing:"0.1em",marginBottom:"3px",fontWeight:600}}>Short Leg</div>
                          <div style={{fontSize:"20px",fontWeight:700,color:t.color,
                            letterSpacing:"0.08em",textTransform:"uppercase"}}>{t.name}</div>
                        </div>
                        {/* Action badge — green for Initiate, instrument color for Roll */}
                        <div style={{padding:"3px 10px",borderRadius:"3px",
                          fontSize:"11px",fontWeight:700,letterSpacing:"0.08em",
                          textTransform:"uppercase",
                          background:isInitiate?"#052e16":t.color+"18",
                          border:`1px solid ${isInitiate?"#14532d":t.color+"55"}`,
                          color:isInitiate?"#22c55e":t.color}}>
                          {isInitiate?"Initiate":"Roll"}
                        </div>
                      </div>
                      {/* Data badges — same style as 0.80+ DELTA / 24+ MO TO EXPIRY */}
                      <div style={{display:"inline-flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}}>
                        <div style={{padding:"3px 9px",borderRadius:"3px",fontSize:"11px",
                          fontWeight:700,letterSpacing:"0.06em",
                          background:t.color+"18",border:`1px solid ${t.color}40`,color:t.color}}>
                          Δ {cfg.delta} SHORT
                        </div>
                        <div style={{padding:"3px 9px",borderRadius:"3px",fontSize:"11px",
                          fontWeight:700,letterSpacing:"0.06em",
                          background:t.color+"18",border:`1px solid ${t.color}40`,color:t.color}}>
                          {cfg.expiry.toUpperCase()}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}

          {/* Band proximity table */}
          <div style={{background:"#070f1f",border:"1px solid #0a1628",borderRadius:"6px",padding:"14px"}}>
            <div style={{fontSize:"12px",color:"#7ab8d8",textTransform:"uppercase",
              letterSpacing:"0.1em",marginBottom:"10px",fontWeight:600}}>Band Proximity</div>
            <div style={{display:"grid",gridTemplateColumns:"3fr 4fr 4fr 3fr",fontSize:"13px",gap:"1px"}}>
              {["Band","Level","Distance","% Away"].map(h=>(
                <div key={h} style={{color:"#7ab8d8",padding:"3px 6px",
                  borderBottom:"1px solid #0a1930",fontSize:"11px",
                  textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:600}}>{h}</div>
              ))}
              {bandRows.map(b=>{
                const near = b.q === nearestAboveQ || b.q === nearestBelowQ;
                const bg   = near?"#0a1a2e":"transparent";
                const instrColor = getTierAndSize(b.q).tier.color;
                return [
                  <div key={b.label+"q"} style={{padding:"4px 5px",borderBottom:"1px solid #050c18",
                    color:instrColor,fontWeight:700,background:bg}}>{b.label}</div>,
                  <div key={b.label+"p"} style={{padding:"4px 5px",borderBottom:"1px solid #050c18",
                    color:"#94a3b8",background:bg}}>{fmtFull(b.bprice)}</div>,
                  <div key={b.label+"d"} style={{padding:"4px 5px",borderBottom:"1px solid #050c18",
                    color:b.above?"#ef4444":"#22c55e",background:bg}}>
                    {b.above?"↑":"↓"} {price>0?fmtFull(Math.abs(b.bprice-price)):"—"}
                  </div>,
                  <div key={b.label+"a"} style={{padding:"4px 5px",borderBottom:"1px solid #050c18",
                    color:b.above?"#ef4444":"#22c55e",background:bg}}>
                    {b.pctAway==="—"?"—":`${parseFloat(b.pctAway)>0?"+":""}${b.pctAway}%`}
                  </div>,
                ];
              })}
            </div>
          </div>
      </div>
      {/* INCOME CONVERTER */}
      <IncomeConverter btcPrice={price} fairValue={fv} activeTier={tier.name}/>

      {/* FORWARD PROJECTION TABLE */}
      <ForwardTable todayTs={todayTs} modelA={modelA} modelB={modelB}/>

      {/* POWER LAW CHART */}
      <PowerLawChart btcPrice={price} todayTs={todayTs} liveHistory={liveHistory} modelA={modelA} modelB={modelB}/>

      <div style={{marginTop:"24px",paddingTop:"16px",borderTop:"1px solid #0a1628"}}>
        <div style={{fontSize:"10px",color:"#3a5a78",textAlign:"center",letterSpacing:"0.12em",textTransform:"uppercase",fontWeight:500}}>
          Kaim Power Law Model  ·  A=5.82  ·  B=−17.029
        </div>
      </div>
    </div>
  );
}


    function App() {
      const [unlocked, setUnlocked] = React.useState(false);
      const [pin, setPin] = React.useState("");
      const [err, setErr] = React.useState(false);

      const attempt = () => {
        if (pin === "4241") { setUnlocked(true); }
        else { setErr(true); setPin(""); setTimeout(() => setErr(false), 2000); }
      };

      if (unlocked) return <BTCPowerLaw />;

      return (
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",
          minHeight:"100vh",background:"#020817",fontFamily:"var(--font, 'JetBrains Mono', monospace)"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:"11px",color:"#5a8fc0",textTransform:"uppercase",
              letterSpacing:"0.18em",marginBottom:"32px",fontWeight:600}}>BTC Quantile Ladder</div>
            <input type="password" maxLength={10} placeholder="····" value={pin}
              onChange={e => setPin(e.target.value)}
              onKeyDown={e => e.key === "Enter" && attempt()}
              style={{background:"#070f1f",border:"1px solid #0f2a42",borderRadius:"6px",
                color:"#facc15",fontSize:"20px",fontFamily:"inherit",padding:"12px 18px",
                width:"160px",outline:"none",textAlign:"center",letterSpacing:"0.3em"}}/>
            <div style={{marginTop:"16px"}}>
              <button onClick={attempt}
                style={{background:"#070f1f",border:"1px solid #1a3a5c",borderRadius:"6px",
                  color:"#8aaac8",fontSize:"11px",fontFamily:"inherit",padding:"10px 24px",
                  cursor:"pointer",letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:600}}>
                Enter
              </button>
            </div>
            <div style={{color:"#ef4444",fontSize:"11px",marginTop:"12px",
              letterSpacing:"0.06em",opacity:err?1:0,transition:"opacity 0.2s"}}>
              incorrect passcode
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
  <script>
    function applyMobileStyles() {
      const mobile = window.innerWidth <= 700;
      const existing = document.getElementById('m');
      if (!mobile) {
        if (existing) existing.remove();
        return;
      }
      if (existing) return;
      const s = document.createElement('style');
      s.id = 'm';
      s.textContent = `
        /* Stat cards: 4-col → 2-col */
        #root [style*="repeat(4, 1fr)"] { grid-template-columns: repeat(2,1fr) !important; }
        /* Income/margin grids: 5-col → 2-col + last full-width */
        #root [style*="repeat(5, 1fr)"] { grid-template-columns: repeat(2,1fr) !important; }
        #root [style*="repeat(5, 1fr)"] > *:nth-child(5) { grid-column: 1 / -1 !important; }
        /* Horizontal scroll for preset buttons and instrument selectors */
        #root [style*="flex-wrap: wrap"][style*="gap: 4px"],
        #root [style*="flex-wrap: wrap"][style*="gap: 5px"] { 
          flex-wrap: nowrap !important; overflow-x: auto !important; 
          -webkit-overflow-scrolling: touch !important; padding-bottom: 4px !important;
          scrollbar-width: none !important;
        }
        #root [style*="flex-wrap: wrap"][style*="gap: 4px"]::-webkit-scrollbar,
        #root [style*="flex-wrap: wrap"][style*="gap: 5px"]::-webkit-scrollbar { display: none !important; }
        /* Header row: stack on mobile */
        #root [style*="justify-content: space-between"][style*="gap: 8px"] { flex-wrap: wrap !important; }
        /* Model selector: wrap */
        #root [style*="margin-left: 4px"][style*="gap: 8px"] { flex-wrap: wrap !important; }
        #root [style*="margin-left: 4px"][style*="gap: 8px"] > * { min-width: 0 !important; }
        /* Income converter chain: stack vertically */
        #root [style*="flex: 1 1 auto"][style*="min-width: 120px"] { min-width: 100% !important; }
        /* Allocation circles: smaller */
        #root [style*="width: 68px"][style*="height: 68px"] { width: 54px !important; height: 54px !important; }
        #root [style*="width: 68px"][style*="height: 68px"] > div { font-size: 18px !important; }
        /* Instrument ladder pills: scroll horizontally */
        #root [style*="gap: 5px"][style*="flex-wrap: wrap"]:last-child {
          flex-wrap: nowrap !important; overflow-x: auto !important;
          -webkit-overflow-scrolling: touch !important; padding-bottom: 4px !important;
        }
        /* Legend rows: 2-col grid, hide hint text */
        #root [style*="gap: 20px"][style*="flex-wrap: wrap"] { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 4px 8px !important; }
        #root [style*="gap: 20px"][style*="flex-wrap: wrap"] > div { flex-wrap: nowrap !important; overflow: hidden !important; }
        #root [style*="gap: 20px"][style*="flex-wrap: wrap"] > div span:last-child { display: none !important; }
        /* Forward projection table: smaller font */
        #root [style*="gridTemplateColumns"][style*="60px"] { font-size: 10px !important; }
        /* Chart legend: hide on mobile (bands are color-coded) */
        #root svg + div, #root [style*="gap: 10px"][style*="flex-wrap: wrap"] { display: none !important; }
      `;
      document.head.appendChild(s);
    }
    // Run after React mounts content
    const _observer = new MutationObserver(() => applyMobileStyles());
    _observer.observe(document.getElementById('root'), {childList:true, subtree:false});
    window.addEventListener('resize', applyMobileStyles);
    // Also run once on load in case observer fires too early
    window.addEventListener('load', applyMobileStyles);
  </script>
</body>
